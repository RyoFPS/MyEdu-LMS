<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - MyEdu LMS</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      text-align: center;
      padding: 20px;
    }

    .container {
      max-width: 500px;
      animation: fadeIn 0.5s ease-in;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .icon {
      font-size: 5rem;
      margin-bottom: 1.5rem;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.1);
      }
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      font-weight: 700;
    }

    p {
      font-size: 1.1rem;
      margin-bottom: 2rem;
      opacity: 0.95;
      line-height: 1.6;
    }

    .actions {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    button {
      background: white;
      color: #667eea;
      border: none;
      padding: 14px 32px;
      font-size: 1rem;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
    }

    button:active {
      transform: translateY(0);
    }

    .secondary {
      background: transparent;
      color: white;
      border: 2px solid white;
    }

    .status {
      margin-top: 2rem;
      padding: 1rem;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      font-size: 0.9rem;
    }

    .status.online {
      background: rgba(76, 175, 80, 0.2);
    }

    .status.offline {
      background: rgba(244, 67, 54, 0.2);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>You're Offline</h1>
    <p>
      It looks like you've lost your internet connection. 
      Some features may not be available until you're back online.
    </p>
    
    <div class="actions">
      <button onclick="window.location.reload()">Try Again</button>
      <button class="secondary" onclick="window.history.back()">Go Back</button>
    </div>

    <div class="status" id="status">
      Checking connection...
    </div>
  </div>

  <script>
    // Monitor online/offline status
    function updateStatus() {
      const statusEl = document.getElementById('status');
      if (navigator.onLine) {
        statusEl.textContent = 'Connection restored! Click "Try Again" to continue.';
        statusEl.className = 'status online';
      } else {
        statusEl.textContent = 'No internet connection detected.';
        statusEl.className = 'status offline';
      }
    }

    // Initial check
    updateStatus();

    // Listen for connection changes
    window.addEventListener('online', () => {
      updateStatus();
      // Auto-reload after a short delay when connection is restored
      setTimeout(() => {
        window.location.reload();
      }, 1500);
    });

    window.addEventListener('offline', updateStatus);

    // Periodic connection check
    setInterval(() => {
      if (navigator.onLine) {
        fetch('/manifest.json', { method: 'HEAD', cache: 'no-cache' })
          .then(() => {
            if (!document.querySelector('.status.online')) {
              updateStatus();
              setTimeout(() => window.location.reload(), 1500);
            }
          })
          .catch(() => {
            // Still offline
          });
      }
    }, 5000);
  </script>
</body>
</html>
